services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
      NEXT_PUBLIC_APP_NAME: ClusterWatch
    ports:
      - "3000:3000"
    depends_on:
      - backend
