name: Terraform Azure Dev

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - "deploy/helm/**"
      - ".github/workflows/terraform-azure-dev.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "deploy/helm/**"
      - ".github/workflows/terraform-azure-dev.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply dev Terraform changes from this workflow run"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_postgres_admin_password: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

defaults:
  run:
    working-directory: terraform

jobs:
  terraform:
    name: Plan and Apply Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Terraform init
        run: terraform init -upgrade

      - name: Select dev workspace
        run: terraform workspace select dev || terraform workspace new dev

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Check required Terraform secrets
        run: |
          if [ -z "$TF_VAR_postgres_admin_password" ]; then
            echo "POSTGRES_ADMIN_PASSWORD GitHub secret is required for terraform plan/apply."
            exit 1
          fi

      - name: Terraform plan
        run: terraform plan -var-file=dev.tfvars -out=tfplan

      - name: Terraform apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.apply)
        run: terraform apply -auto-approve tfplan
