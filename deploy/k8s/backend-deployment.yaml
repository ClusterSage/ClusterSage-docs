apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterwatch-backend
  namespace: clusterwatch
spec:
  replicas: 2
  selector: { matchLabels: { app: clusterwatch-backend } }
  template:
    metadata: { labels: { app: clusterwatch-backend } }
    spec:
      containers:
        - name: backend
          image: <acr>.azurecr.io/clusterwatch-backend:0.1.0
          ports: [{ containerPort: 8000, name: http }]
          envFrom:
            - configMapRef: { name: clusterwatch-config }
            - secretRef: { name: clusterwatch-secrets }
          readinessProbe:
            httpGet: { path: /health, port: http }
