apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: clustersage-public
  namespace: kgateway-system
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clusterwatch-backend
  namespace: clusterwatch
spec:
  parentRefs:
    - name: clustersage-public
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: Exact
            value: /health
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: clusterwatch-backend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: clusterwatch-frontend
  namespace: clusterwatch
spec:
  parentRefs:
    - name: clustersage-public
      namespace: kgateway-system
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: clusterwatch-frontend
          port: 80
