apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterwatch-frontend
  namespace: clusterwatch
spec:
  replicas: 2
  selector: { matchLabels: { app: clusterwatch-frontend } }
  template:
    metadata: { labels: { app: clusterwatch-frontend } }
    spec:
      containers:
        - name: frontend
          image: <acr>.azurecr.io/clusterwatch-frontend:0.1.0
          ports: [{ containerPort: 3000, name: http }]
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom: { configMapKeyRef: { name: clusterwatch-config, key: NEXT_PUBLIC_API_URL } }
