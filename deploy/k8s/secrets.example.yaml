apiVersion: v1
kind: Secret
metadata:
  name: clusterwatch-secrets
  namespace: clusterwatch
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://clusterwatch:<password>@<server>.postgres.database.azure.com:5432/clusterwatch?ssl=require
  JWT_SECRET: replace-with-32-byte-secret
  AGENT_TOKEN_SECRET: replace-with-32-byte-secret
  AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=<storage>;AccountKey=<key>;EndpointSuffix=core.windows.net
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clusterwatch-config
  namespace: clusterwatch
data:
  APP_ENV: production
  PUBLIC_APP_URL: https://app.example.com
  PUBLIC_API_URL: https://api.example.com
  CORS_ALLOWED_ORIGINS: https://app.example.com
  AZURE_STORAGE_CONTAINER: clusterwatch-data
  NEXT_PUBLIC_API_URL: https://api.example.com
