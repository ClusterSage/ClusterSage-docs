global:
  imagePullSecrets: []
frontend:
  image:
    repository: ""
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicaCount: 2
  env:
    NEXT_PUBLIC_API_URL: ""
backend:
  image:
    repository: ""
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  replicaCount: 2
  env:
    APP_ENV: "production"
    PUBLIC_APP_URL: ""
    PUBLIC_API_URL: ""
    CORS_ALLOWED_ORIGINS: ""
    AZURE_STORAGE_CONTAINER: "clusterwatch-data"
  secrets:
    DATABASE_URL: ""
    JWT_SECRET: ""
    AGENT_TOKEN_SECRET: ""
    AZURE_STORAGE_CONNECTION_STRING: ""
ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
          service: backend
  tls:
    enabled: false
    secretName: ""
migrations:
  enabled: true
